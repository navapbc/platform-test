name: CI - app-catala

on:
  push:
    branches:
      - main
    paths:
      - app-catala/**
      - .github/workflows/ci-app-catala.yml
  pull_request:
    paths:
      - app-catala/**
      - .github/workflows/ci-app-catala.yml

defaults:
  run:
    working-directory: ./app-catala

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run format check
        run: make format-check

      - name: Run linting
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Run Python tests
        run: make test-coverage

  catala-test:
    name: Catala Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Catala tests
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE/app-catala":/work \
            -w /work \
            -e HOME=/home/ocaml \
            --user root \
            registry.gitlab.inria.fr/catala/ci-images:latest-python \
            sh -c 'eval $(opam env) && make SHELL=/bin/sh catala-test'
